spring.application.name=student-app

# H2 Database Connection Settings
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# DDl-auto: automatically creates or updates tables based on your Java Entities
# Options: 'update' (updates schema), 'create' (drops and recreates tables on startup)
# spring.jpa.hibernate.ddl-auto=update

# Optional: Set to true if you want to see the exact SQL queries Spring Boot runs in your terminal
# spring.jpa.show-sql=true